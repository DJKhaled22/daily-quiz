<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Quiz – March 09, 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 24px;
      color: #0a0a0a;
    }
    .card {
      max-width: 600px;
      width: 100%;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    .header-left {}
    .header-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #999999;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .header-date {
      font-size: 1.1rem;
      font-weight: 600;
      color: #888888;
    }
    .home-btn {
      display: none;
      padding: 8px 18px;
      background: #ffffff;
      color: #0a0a0a;
      border: 1px solid #e8e8e8;
      border-radius: 999px;
      font-size: 0.82rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .home-btn:hover { border-color: #0a0a0a; background: #f5f5f5; }
    .home-btn.visible { display: inline-block; }
    .progress-bar {
      height: 3px;
      background: #e8e8e8;
      border-radius: 999px;
      margin-bottom: 40px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #00c87a;
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    /* ── Source attribution ── */
    .source-tag {
      margin-bottom: 16px;
    }
    .source-book {
      font-size: 1rem;
      font-weight: 700;
      color: #0a0a0a;
      font-style: italic;
    }
    .source-author {
      font-size: 0.95rem;
      color: #555555;
      margin-left: 4px;
    }
    .source-topic {
      font-size: 0.78rem;
      font-weight: 600;
      color: #999999;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── Home screen ── */
    .home-screen {
      display: none;
    }
    .home-screen.show { display: block; }
    .home-title {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 12px;
    }
    .home-subtitle {
      font-size: 0.95rem;
      color: #666666;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .path-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .path-card {
      border: 1px solid #e8e8e8;
      border-radius: 16px;
      padding: 24px 28px;
      cursor: pointer;
      text-align: left;
      background: #ffffff;
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s;
      width: 100%;
    }
    .path-card:hover {
      border-color: #0a0a0a;
      background: #fafafa;
    }
    .path-card-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #0a0a0a;
    }
    .path-card-desc {
      font-size: 0.875rem;
      color: #666666;
      line-height: 1.55;
    }
    .path-card-tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 3px 10px;
      margin-bottom: 10px;
    }
    .tag-quiz { background: #e6fff4; color: #007a4a; }
    .tag-facts { background: #f0f0ff; color: #4040cc; }

    /* ── Quiz ── */
    .quiz-screen { display: none; }
    .quiz-screen.show { display: block; }
    .question {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 32px;
      color: #0a0a0a;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
    }
    .option-btn {
      text-align: left;
      padding: 16px 22px;
      border: 1px solid #e8e8e8;
      border-radius: 999px;
      background: #ffffff;
      font-size: 0.95rem;
      font-family: inherit;
      color: #0a0a0a;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      line-height: 1.45;
    }
    .option-btn:hover:not(:disabled) { background: #f5f5f5; }
    .option-btn.correct {
      border-color: #00c87a;
      background: #e6fff4;
      color: #007a4a;
    }
    .option-btn.wrong {
      border-color: #ff4d4d;
      background: #fff0f0;
      color: #cc0000;
    }
    .option-btn:disabled { cursor: default; }
    .explanation {
      display: none;
      border-left: 3px solid #e8e8e8;
      padding: 12px 16px;
      font-size: 0.875rem;
      color: #666666;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .explanation.show { display: block; }

    /* ── Score screen ── */
    .score-screen {
      display: none;
      text-align: center;
      padding-top: 24px;
    }
    .score-screen.show { display: block; }
    .score-big {
      font-size: 5rem;
      font-weight: 700;
      color: #0a0a0a;
      line-height: 1;
      margin-bottom: 8px;
    }
    .score-label {
      font-size: 1rem;
      color: #999999;
      margin-bottom: 24px;
    }
    .score-msg {
      font-size: 1.2rem;
      font-weight: 600;
      color: #0a0a0a;
      margin-bottom: 40px;
    }

    /* ── Facts screen ── */
    .facts-screen { display: none; }
    .facts-screen.show { display: block; }
    .fact-number {
      font-size: 0.78rem;
      font-weight: 600;
      color: #999999;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .fact-title {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 16px;
      color: #0a0a0a;
    }
    .fact-body {
      font-size: 1rem;
      color: #444444;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    /* ── Facts done screen ── */
    .facts-done-screen {
      display: none;
      text-align: center;
      padding-top: 24px;
    }
    .facts-done-screen.show { display: block; }
    .facts-done-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .facts-done-msg {
      font-size: 1rem;
      color: #666666;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    /* ── Shared buttons ── */
    .btn-primary {
      display: inline-block;
      padding: 14px 32px;
      background: #0a0a0a;
      color: #ffffff;
      border: none;
      border-radius: 999px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.82; }
    .btn-outline {
      display: inline-block;
      padding: 14px 32px;
      background: #ffffff;
      color: #0a0a0a;
      border: 1px solid #0a0a0a;
      border-radius: 999px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-outline:hover { background: #0a0a0a; color: #ffffff; }
    .btn-hidden { display: none; }
    .btn-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="header-left">
      <div class="header-label">Daily Learning</div>
      <div class="header-date">March 09, 2026</div>
    </div>
    <button class="home-btn" id="home-btn" onclick="showHome()">← Home</button>
  </div>
  <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>

  <!-- Home screen -->
  <div class="home-screen show" id="home-screen">
    <div class="home-title">Daily Insights from Hyder's Favourite Reads</div>
    <div class="home-subtitle">
      Every book I read, I take notes. This is where those notes come to life — a daily quiz or a fresh insight, refreshed every morning.
    </div>
    <div class="path-cards">
      <button class="path-card" onclick="startQuiz()">
        <div class="path-card-tag tag-quiz">Quiz</div>
        <div class="path-card-title">Test your knowledge</div>
        <div class="path-card-desc">5 multiple-choice questions on ideas from your books. See how much stuck — answers and explanations included.</div>
      </button>
      <button class="path-card" onclick="startFacts()">
        <div class="path-card-tag tag-facts">Interesting Facts</div>
        <div class="path-card-title">Just learn something new</div>
        <div class="path-card-desc">5 surprising or thought-provoking ideas pulled from today's reading. No right or wrong — just things worth knowing.</div>
      </button>
    </div>
  </div>

  <!-- Quiz screen -->
  <div class="quiz-screen" id="quiz-screen">
    <div class="source-tag" id="quiz-source"></div>
    <div class="question" id="question-text"></div>
    <div class="options" id="options-container"></div>
    <div class="explanation" id="explanation"></div>
    <div class="btn-row">
      <button class="btn-primary btn-hidden" id="next-btn">Next question →</button>
    </div>
  </div>

  <!-- Score screen -->
  <div class="score-screen" id="score-screen">
    <div class="score-big" id="score-value"></div>
    <div class="score-label">out of 5</div>
    <div class="score-msg" id="score-msg"></div>
    <div class="btn-row" style="justify-content:center; gap:12px;">
      <button class="btn-outline" onclick="showHome()">Back to home</button>
      <button class="btn-outline" onclick="startQuiz()">Try again</button>
    </div>
  </div>

  <!-- Facts screen -->
  <div class="facts-screen" id="facts-screen">
    <div class="fact-number" id="fact-number"></div>
    <div class="fact-title" id="fact-title"></div>
    <div class="fact-body" id="fact-body"></div>
    <div class="source-tag" id="fact-source"></div>
    <div class="btn-row">
      <button class="btn-primary" id="fact-next-btn">Next fact →</button>
    </div>
  </div>

  <!-- Facts done screen -->
  <div class="facts-done-screen" id="facts-done-screen">
    <div class="facts-done-title">That's a wrap.</div>
    <div class="facts-done-msg">5 ideas from today's reading. Come back tomorrow for more.</div>
    <div class="btn-row" style="justify-content:center; gap:12px;">
      <button class="btn-outline" onclick="showHome()">Back to home</button>
      <button class="btn-outline" onclick="startFacts()">Read again</button>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [{"question": "In 'Trust' by Hernan Diaz, what initially motivated Benjamin Rask to abandon his family's investment house and pursue riskier, speculative investments?", "options": ["A desire to distance himself from his father's tobacco legacy", "A gain in gold bonds that sparked a rare sense of accomplishment", "Pressure from his business partner Sheldon Loyd", "The onset of the Great War and demand for war industry stocks"], "answer": 1, "explanation": "According to the note, it was specifically a gain in gold bonds that first spurred Benjamin to dismiss his family's investment house and pursue more speculative investments, giving him what felt like his first real sense of accomplishment.", "book": "Trust", "author": "Hernan Diaz", "topic": "Literary Fiction"}, {"question": "According to the notes on poverty in America, why do some large corporations like those represented by the US Chamber of Commerce support expanding the Earned Income Tax Credit?", "options": ["To reduce the federal deficit by encouraging more Americans to work", "To support low-income families as part of their corporate social responsibility programs", "Because it effectively subsidises their underpaid employees at taxpayer expense", "To offset the cost of raising the minimum wage in their supply chains"], "answer": 2, "explanation": "The note explicitly states that many large corporations pushed for expansion of the Earned Income Tax Credit because it subsidises their underpaid employees — meaning taxpayers bear the cost of supplementing wages that corporations keep low.", "book": "Poverty, by America", "author": "Matthew Desmond", "topic": "American Poverty"}, {"question": "In the notes about Apple in China, what does the 'catfish effect' refer to in the context of China's industrial strategy?", "options": ["China's tactic of flooding foreign markets with cheap goods to undercut competitors", "Apple's strategy of introducing a dominant product to stimulate the entire Chinese tech ecosystem", "The way a single predatory competitor keeps an entire industry more alert and productive", "A method Chinese regulators use to test vulnerabilities in foreign technology platforms"], "answer": 2, "explanation": "The note describes the catfish effect using the analogy of a Norwegian farmer who put a catfish among sardines — the single predator kept the sardines moving and alive. In the industrial context, one strong competitor keeps the whole sector more competitive and vigorous.", "book": "Apple in China", "author": "Patrick McGee", "topic": "Big Tech China"}, {"question": "According to 'Storyworthy' by Matthew Dicks, what distinguishes a true story from a mere anecdote?", "options": ["A story must be dramatic and based on a life-changing event", "A story must involve other people and not just the narrator", "A story must demonstrate change over time in the narrator", "A story must be entertaining enough to tell at a formal performance"], "answer": 2, "explanation": "The note clearly states that a personal story must include 'change over time' — it must start in one place and end somewhere new. Without that change, it is simply an anecdote, not a story.", "book": "Storyworthy", "author": "Matthew Dicks", "topic": "Storytelling Craft"}, {"question": "Based on the notes from 'How to Win Friends and Influence People,' which of the following best captures a key principle of effective storytelling and interpersonal communication described in the source material?", "options": ["Rely on theatrical delivery and poetic language to captivate your audience", "Keep your story consistent whether telling it casually or in a formal setting", "Focus exclusively on dramatic personal experiences to build connection", "Always tell stories from multiple perspectives to show empathy"], "answer": 1, "explanation": "The 'dinner test' principle from the Storyworthy notes (referenced alongside How to Win Friends and Influence People) emphasises that the story you tell formally and the one you tell casually should be 'kissing cousins' — authentic and consistent, without over-dramatisation.", "book": "How to Win Friends and Influence People", "author": "Dale Carnegie", "topic": "Communication Skills"}];
const FACTS = [{"title": "Troy Named After Grandfather, Not City", "fact": "Troy was founded by Ilus but named in honour of his father Tros — meaning the city's famous name belongs to a man who never built it. Even more strikingly, its first king Priam earned his name from the act of being 'bought back,' derived from his sister Hesione ransoming him with a golden veil from Aphrodite after Heracles massacred their family.", "book": "Troy", "author": "Stephen Fry", "topic": "Greek Mythology"}, {"title": "Midgard's Walls Built From Eyelashes", "fact": "In Norse mythology, the great protective wall surrounding Midgard — the realm of humans — was constructed from the eyelashes of the primordial giant Ymir. This same giant's flesh became soil, his skull the sky, his blood the rivers, and his bones the mountains, making all of the physical world literally a repurposed corpse.", "book": "Norse Mythology", "author": "Neil Gaiman", "topic": "Norse Mythology"}, {"title": "Time Itself Is the Villain", "fact": "The title 'A Visit from the Goon Squad' refers not to a person or gang, but to time — the unstoppable force that ages everyone and dismantles the lives they imagined for themselves. The novel's structure reinforces this by opening with a young Sasha and closing with a new young woman living in her old apartment, completing a quiet, melancholy circle.", "book": "A Visit from the Goon Squad", "author": "Jennifer Egan", "topic": "Literary Fiction"}, {"title": "Criticism Hardens, Praise Transforms", "fact": "Carnegie argues that directly criticising people almost never changes their behaviour — instead it puts them on the defensive and breeds resentment, even when the criticism is entirely justified. The counterintuitive implication is that making someone feel genuinely valued is more effective at changing conduct than pointing out what they did wrong.", "book": "How to Win Friends and Influence People", "author": "Dale Carnegie", "topic": "Self-Help, Persuasion"}, {"title": "Mirrors Reflect How We Wish to Look", "fact": "In a quietly profound moment, the Count realises that mirrors don't show us as we truly are — they show us from our preferred angle, the way we have chosen to see ourselves over years of habit. This insight prompts him to shave his prized moustache, symbolising a rare willingness to abandon a comforting self-image.", "book": "A Gentleman in Moscow", "author": "Amor Towles", "topic": "Historical Literary Fiction"}];

let current = 0;
let score = 0;

function hide(id) { document.getElementById(id).classList.remove("show"); }
function show(id) { document.getElementById(id).classList.add("show"); }

function showHome() {
  hide("quiz-screen");
  hide("score-screen");
  hide("facts-screen");
  hide("facts-done-screen");
  document.getElementById("progress-fill").style.width = "0%";
  document.getElementById("home-btn").classList.remove("visible");
  show("home-screen");
}

// ── Quiz ──

function startQuiz() {
  current = 0;
  score = 0;
  hide("home-screen");
  hide("score-screen");
  document.getElementById("home-btn").classList.add("visible");
  show("quiz-screen");
  showQuestion();
}

function showQuestion() {
  const q = QUESTIONS[current];
  document.getElementById("progress-fill").style.width =
    `${((current + 1) / QUESTIONS.length) * 100}%`;
  document.getElementById("quiz-source").innerHTML =
    `<div><span class="source-book">${q.book}</span><span class="source-author">&mdash; ${q.author}</span></div><div class="source-topic">Topic: ${q.topic}</div>`;
  document.getElementById("question-text").textContent = q.question;
  document.getElementById("explanation").textContent = "";
  document.getElementById("explanation").classList.remove("show");
  const nextBtn = document.getElementById("next-btn");
  nextBtn.classList.add("btn-hidden");

  const container = document.getElementById("options-container");
  container.innerHTML = "";
  const labels = ["A", "B", "C", "D"];
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = `${labels[i]}. ${opt}`;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });
}

function selectAnswer(chosen) {
  const q = QUESTIONS[current];
  const buttons = document.querySelectorAll(".option-btn");
  buttons.forEach(b => b.disabled = true);
  if (chosen === q.answer) {
    buttons[chosen].classList.add("correct");
    score++;
  } else {
    buttons[chosen].classList.add("wrong");
    buttons[q.answer].classList.add("correct");
  }
  const expEl = document.getElementById("explanation");
  expEl.textContent = q.explanation;
  expEl.classList.add("show");
  document.getElementById("next-btn").classList.remove("btn-hidden");
}

document.getElementById("next-btn").addEventListener("click", () => {
  current++;
  if (current < QUESTIONS.length) {
    showQuestion();
  } else {
    hide("quiz-screen");
    show("score-screen");
    document.getElementById("score-value").textContent = score;
    const msgs = [
      "Keep reading — you'll get there!",
      "Not bad, keep going!",
      "Good effort!",
      "Well done!",
      "Almost perfect!",
      "Perfect score! Outstanding!"
    ];
    document.getElementById("score-msg").textContent = msgs[score];
  }
});

// ── Facts ──

function startFacts() {
  current = 0;
  hide("home-screen");
  hide("facts-done-screen");
  document.getElementById("home-btn").classList.add("visible");
  show("facts-screen");
  showFact();
}

function showFact() {
  const f = FACTS[current];
  document.getElementById("progress-fill").style.width =
    `${((current + 1) / FACTS.length) * 100}%`;
  document.getElementById("fact-number").textContent =
    `Fact ${current + 1} of ${FACTS.length}`;
  document.getElementById("fact-title").textContent = f.title;
  document.getElementById("fact-body").textContent = f.fact;
  document.getElementById("fact-source").innerHTML =
    `<div><span class="source-book">${f.book}</span><span class="source-author">&mdash; ${f.author}</span></div><div class="source-topic">Topic: ${f.topic}</div>`;
  document.getElementById("fact-next-btn").textContent =
    current < FACTS.length - 1 ? "Next fact →" : "Finish";
}

document.getElementById("fact-next-btn").addEventListener("click", () => {
  current++;
  if (current < FACTS.length) {
    showFact();
  } else {
    hide("facts-screen");
    document.getElementById("progress-fill").style.width = "100%";
    show("facts-done-screen");
  }
});
</script>
</body>
</html>
