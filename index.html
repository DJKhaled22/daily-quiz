<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Quiz – March 09, 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 24px;
      color: #0a0a0a;
    }
    .card {
      max-width: 600px;
      width: 100%;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    .header-left {}
    .header-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #999999;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .header-date {
      font-size: 1.1rem;
      font-weight: 600;
      color: #888888;
    }
    .home-btn {
      display: none;
      padding: 8px 18px;
      background: #ffffff;
      color: #0a0a0a;
      border: 1px solid #e8e8e8;
      border-radius: 999px;
      font-size: 0.82rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .home-btn:hover { border-color: #0a0a0a; background: #f5f5f5; }
    .home-btn.visible { display: inline-block; }
    .progress-bar {
      height: 3px;
      background: #e8e8e8;
      border-radius: 999px;
      margin-bottom: 40px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #00c87a;
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    /* ── Source attribution ── */
    .source-tag {
      display: inline-block;
      font-size: 0.78rem;
      color: #999999;
      margin-bottom: 14px;
    }
    .source-tag span {
      font-style: italic;
    }

    /* ── Home screen ── */
    .home-screen {
      display: none;
    }
    .home-screen.show { display: block; }
    .home-title {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 12px;
    }
    .home-subtitle {
      font-size: 0.95rem;
      color: #666666;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .path-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .path-card {
      border: 1px solid #e8e8e8;
      border-radius: 16px;
      padding: 24px 28px;
      cursor: pointer;
      text-align: left;
      background: #ffffff;
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s;
      width: 100%;
    }
    .path-card:hover {
      border-color: #0a0a0a;
      background: #fafafa;
    }
    .path-card-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #0a0a0a;
    }
    .path-card-desc {
      font-size: 0.875rem;
      color: #666666;
      line-height: 1.55;
    }
    .path-card-tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 3px 10px;
      margin-bottom: 10px;
    }
    .tag-quiz { background: #e6fff4; color: #007a4a; }
    .tag-facts { background: #f0f0ff; color: #4040cc; }

    /* ── Quiz ── */
    .quiz-screen { display: none; }
    .quiz-screen.show { display: block; }
    .question {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 32px;
      color: #0a0a0a;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
    }
    .option-btn {
      text-align: left;
      padding: 16px 22px;
      border: 1px solid #e8e8e8;
      border-radius: 999px;
      background: #ffffff;
      font-size: 0.95rem;
      font-family: inherit;
      color: #0a0a0a;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      line-height: 1.45;
    }
    .option-btn:hover:not(:disabled) { background: #f5f5f5; }
    .option-btn.correct {
      border-color: #00c87a;
      background: #e6fff4;
      color: #007a4a;
    }
    .option-btn.wrong {
      border-color: #ff4d4d;
      background: #fff0f0;
      color: #cc0000;
    }
    .option-btn:disabled { cursor: default; }
    .explanation {
      display: none;
      border-left: 3px solid #e8e8e8;
      padding: 12px 16px;
      font-size: 0.875rem;
      color: #666666;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .explanation.show { display: block; }

    /* ── Score screen ── */
    .score-screen {
      display: none;
      text-align: center;
      padding-top: 24px;
    }
    .score-screen.show { display: block; }
    .score-big {
      font-size: 5rem;
      font-weight: 700;
      color: #0a0a0a;
      line-height: 1;
      margin-bottom: 8px;
    }
    .score-label {
      font-size: 1rem;
      color: #999999;
      margin-bottom: 24px;
    }
    .score-msg {
      font-size: 1.2rem;
      font-weight: 600;
      color: #0a0a0a;
      margin-bottom: 40px;
    }

    /* ── Facts screen ── */
    .facts-screen { display: none; }
    .facts-screen.show { display: block; }
    .fact-number {
      font-size: 0.78rem;
      font-weight: 600;
      color: #999999;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .fact-title {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 16px;
      color: #0a0a0a;
    }
    .fact-body {
      font-size: 1rem;
      color: #444444;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    /* ── Facts done screen ── */
    .facts-done-screen {
      display: none;
      text-align: center;
      padding-top: 24px;
    }
    .facts-done-screen.show { display: block; }
    .facts-done-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .facts-done-msg {
      font-size: 1rem;
      color: #666666;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    /* ── Shared buttons ── */
    .btn-primary {
      display: inline-block;
      padding: 14px 32px;
      background: #0a0a0a;
      color: #ffffff;
      border: none;
      border-radius: 999px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.82; }
    .btn-outline {
      display: inline-block;
      padding: 14px 32px;
      background: #ffffff;
      color: #0a0a0a;
      border: 1px solid #0a0a0a;
      border-radius: 999px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-outline:hover { background: #0a0a0a; color: #ffffff; }
    .btn-hidden { display: none; }
    .btn-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="header-left">
      <div class="header-label">Daily Learning</div>
      <div class="header-date">March 09, 2026</div>
    </div>
    <button class="home-btn" id="home-btn" onclick="showHome()">← Home</button>
  </div>
  <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>

  <!-- Home screen -->
  <div class="home-screen show" id="home-screen">
    <div class="home-title">Daily Insights from Hyder's Favourite Reads</div>
    <div class="home-subtitle">
      Every book I read, I take notes. This is where those notes come to life — a daily quiz or a fresh insight, refreshed every morning.
    </div>
    <div class="path-cards">
      <button class="path-card" onclick="startQuiz()">
        <div class="path-card-tag tag-quiz">Quiz</div>
        <div class="path-card-title">Test your knowledge</div>
        <div class="path-card-desc">5 multiple-choice questions on ideas from your books. See how much stuck — answers and explanations included.</div>
      </button>
      <button class="path-card" onclick="startFacts()">
        <div class="path-card-tag tag-facts">Interesting Facts</div>
        <div class="path-card-title">Just learn something new</div>
        <div class="path-card-desc">5 surprising or thought-provoking ideas pulled from today's reading. No right or wrong — just things worth knowing.</div>
      </button>
    </div>
  </div>

  <!-- Quiz screen -->
  <div class="quiz-screen" id="quiz-screen">
    <div class="source-tag" id="quiz-source"></div>
    <div class="question" id="question-text"></div>
    <div class="options" id="options-container"></div>
    <div class="explanation" id="explanation"></div>
    <div class="btn-row">
      <button class="btn-primary btn-hidden" id="next-btn">Next question →</button>
    </div>
  </div>

  <!-- Score screen -->
  <div class="score-screen" id="score-screen">
    <div class="score-big" id="score-value"></div>
    <div class="score-label">out of 5</div>
    <div class="score-msg" id="score-msg"></div>
    <div class="btn-row" style="justify-content:center; gap:12px;">
      <button class="btn-outline" onclick="showHome()">Back to home</button>
      <button class="btn-outline" onclick="startQuiz()">Try again</button>
    </div>
  </div>

  <!-- Facts screen -->
  <div class="facts-screen" id="facts-screen">
    <div class="fact-number" id="fact-number"></div>
    <div class="fact-title" id="fact-title"></div>
    <div class="fact-body" id="fact-body"></div>
    <div class="source-tag" id="fact-source"></div>
    <div class="btn-row">
      <button class="btn-primary" id="fact-next-btn">Next fact →</button>
    </div>
  </div>

  <!-- Facts done screen -->
  <div class="facts-done-screen" id="facts-done-screen">
    <div class="facts-done-title">That's a wrap.</div>
    <div class="facts-done-msg">5 ideas from today's reading. Come back tomorrow for more.</div>
    <div class="btn-row" style="justify-content:center; gap:12px;">
      <button class="btn-outline" onclick="showHome()">Back to home</button>
      <button class="btn-outline" onclick="startFacts()">Read again</button>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [{"question": "What was the core strategic logic behind the Schlieffen Plan regarding a two-front war?", "options": ["Attack Russia first while France remained neutral, then pivot west", "Defend German borders and wait for France and Russia to overextend", "Aggressively defeat France first through Belgium, then turn east against the slower-mobilizing Russia", "Split German forces equally between France and Russia from the outset"], "answer": 2, "explanation": "The Schlieffen Plan called for a rapid defeat of France by flanking through Belgium, banking on Russia's slow mobilization due to its vast land mass and weak infrastructure, allowing Germany to then redirect forces eastward.", "book": "The Guns of August", "author": "Barbara Tuchman"}, {"question": "According to the notes on 'Destiny Disrupted,' why did the French invest heavily in Russia prior to World War One?", "options": ["France wanted to expand trade routes through Central Asia", "France sought to modernize Russia's military technology", "France wanted to create a two-front war scenario against Germany", "France hoped Russia would help suppress Ottoman expansion"], "answer": 2, "explanation": "The notes state that France invested in Russia because it wanted a two-front war, forcing Germany to split its military focus between east and west.", "book": "Destiny Disrupted", "author": "Tamim Ansary"}, {"question": "What unusual logistical decision did Genghis Khan make when crossing deserts during his campaigns?", "options": ["He traveled only at night to avoid the heat and enemy detection", "He waited for the coldest months so his army could travel light and use frozen ground", "He built elaborate supply chains with camel caravans carrying water and food", "He avoided deserts entirely and used river routes for all major movements"], "answer": 1, "explanation": "According to the notes, Khan deliberately chose the coldest months for desert crossings so his army could carry less water, travel light, and take advantage of grass growth for grazing animals.", "book": "Genghis Khan and the Making of the Modern World", "author": "Jack Weatherford"}, {"question": "What distinguished Cleopatra from most other Ptolemaic rulers in terms of language?", "options": ["She was the only Ptolemy to read and write hieroglyphics fluently", "She rejected Greek entirely and communicated exclusively in Latin with Roman leaders", "She was among the few Ptolemies to speak Egyptian and could speak up to nine languages without interpreters", "She invented a new diplomatic language combining Greek and Egyptian"], "answer": 2, "explanation": "The notes highlight that most Ptolemies spoke primarily Greek, but Cleopatra was notable for speaking Egyptian as well as up to nine languages, allowing her to communicate without interpreters.", "book": "Cleopatra: A Life", "author": "Stacy Schiff"}, {"question": "According to the notes on 'Arabs,' what is the linguistic origin of the Arabic word for politics, 'Siyasah'?", "options": ["It derives from the Arabic root word for governance and law", "It stems from an ancient term meaning the writing of contracts", "Its origins are tied to the herding of horses and camels", "It comes from the Greek word 'polis,' meaning city"], "answer": 2, "explanation": "The notes explicitly contrast the English word 'politics,' which comes from 'polis' meaning city, with the Arabic 'Siyasah,' whose origins trace back to words related to the herding of horses and camels.", "book": "Arabs: A 3,000-Year History of Peoples, Tribes and Empires", "author": "Tim Mackintosh-Smith"}];
const FACTS = [{"title": "Obstacles as Engineered Opportunities", "fact": "The Stoic philosophy underlying Marcus Aurelius's thinking holds that obstacles are not just things to endure but can literally become the path forward — the resistance itself shapes you. 'Hurricane' Carter, falsely imprisoned, refused to see himself as a prisoner and left jail stronger and more learned than when he entered, demonstrating that the story we tell ourselves about adversity may matter more than the adversity itself.", "book": "The Obstacle Is the Way", "author": "Ryan Holiday"}, {"title": "Carthage's Fall Broke Rome", "fact": "Defeating Carthage in 146 BC — Rome's greatest external threat — paradoxically triggered Rome's internal collapse. With no powerful foreign enemy to unite against, the Roman Republic descended into economic inequality, political polarization, and corruption, suggesting that existential threats can be a hidden source of social cohesion.", "book": "The Storm Before the Storm", "author": "Mike Duncan"}, {"title": "Thor Was Actually a Redhead", "fact": "Contrary to popular modern depictions, the Norse mythological Thor was described as a redhead, not blonde. He also required an enchanted belt and iron gloves just to wield his own hammer Mjolnir — meaning even the god of thunder needed equipment augmentations to handle his signature weapon.", "book": "Norse Mythology", "author": "Neil Gaiman"}, {"title": "Balfour Never Mentioned Palestinians", "fact": "The 1917 Balfour Declaration, the foundational British document supporting a Jewish homeland in Palestine, never once mentioned the Arab Palestinian population that already lived there — a deliberate omission that shaped the legal and political erasure of Palestinian identity for decades to come.", "book": "The Hundred Years' War on Palestine", "author": "Rashid Khalidi"}, {"title": "Robots Faced Human Union Protests", "fact": "In Asimov's fictional world of iRobot, the introduction of robots into society was met with public protests and union opposition — a remarkably prescient detail written decades before automation anxiety became a defining feature of real economic and labor debates.", "book": "I, Robot", "author": "Isaac Asimov"}];

let current = 0;
let score = 0;

function hide(id) { document.getElementById(id).classList.remove("show"); }
function show(id) { document.getElementById(id).classList.add("show"); }

function showHome() {
  hide("quiz-screen");
  hide("score-screen");
  hide("facts-screen");
  hide("facts-done-screen");
  document.getElementById("progress-fill").style.width = "0%";
  document.getElementById("home-btn").classList.remove("visible");
  show("home-screen");
}

// ── Quiz ──

function startQuiz() {
  current = 0;
  score = 0;
  hide("home-screen");
  hide("score-screen");
  document.getElementById("home-btn").classList.add("visible");
  show("quiz-screen");
  showQuestion();
}

function showQuestion() {
  const q = QUESTIONS[current];
  document.getElementById("progress-fill").style.width =
    `${((current + 1) / QUESTIONS.length) * 100}%`;
  document.getElementById("quiz-source").innerHTML =
    `<span>${q.book}</span> &mdash; ${q.author}`;
  document.getElementById("question-text").textContent = q.question;
  document.getElementById("explanation").textContent = "";
  document.getElementById("explanation").classList.remove("show");
  const nextBtn = document.getElementById("next-btn");
  nextBtn.classList.add("btn-hidden");

  const container = document.getElementById("options-container");
  container.innerHTML = "";
  const labels = ["A", "B", "C", "D"];
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = `${labels[i]}. ${opt}`;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });
}

function selectAnswer(chosen) {
  const q = QUESTIONS[current];
  const buttons = document.querySelectorAll(".option-btn");
  buttons.forEach(b => b.disabled = true);
  if (chosen === q.answer) {
    buttons[chosen].classList.add("correct");
    score++;
  } else {
    buttons[chosen].classList.add("wrong");
    buttons[q.answer].classList.add("correct");
  }
  const expEl = document.getElementById("explanation");
  expEl.textContent = q.explanation;
  expEl.classList.add("show");
  document.getElementById("next-btn").classList.remove("btn-hidden");
}

document.getElementById("next-btn").addEventListener("click", () => {
  current++;
  if (current < QUESTIONS.length) {
    showQuestion();
  } else {
    hide("quiz-screen");
    show("score-screen");
    document.getElementById("score-value").textContent = score;
    const msgs = [
      "Keep reading — you'll get there!",
      "Not bad, keep going!",
      "Good effort!",
      "Well done!",
      "Almost perfect!",
      "Perfect score! Outstanding!"
    ];
    document.getElementById("score-msg").textContent = msgs[score];
  }
});

// ── Facts ──

function startFacts() {
  current = 0;
  hide("home-screen");
  hide("facts-done-screen");
  document.getElementById("home-btn").classList.add("visible");
  show("facts-screen");
  showFact();
}

function showFact() {
  const f = FACTS[current];
  document.getElementById("progress-fill").style.width =
    `${((current + 1) / FACTS.length) * 100}%`;
  document.getElementById("fact-number").textContent =
    `Fact ${current + 1} of ${FACTS.length}`;
  document.getElementById("fact-title").textContent = f.title;
  document.getElementById("fact-body").textContent = f.fact;
  document.getElementById("fact-source").innerHTML =
    `<span>${f.book}</span> &mdash; ${f.author}`;
  document.getElementById("fact-next-btn").textContent =
    current < FACTS.length - 1 ? "Next fact →" : "Finish";
}

document.getElementById("fact-next-btn").addEventListener("click", () => {
  current++;
  if (current < FACTS.length) {
    showFact();
  } else {
    hide("facts-screen");
    document.getElementById("progress-fill").style.width = "100%";
    show("facts-done-screen");
  }
});
</script>
</body>
</html>
