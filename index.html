<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Quiz – March 09, 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 24px;
      color: #0a0a0a;
    }
    .card {
      max-width: 600px;
      width: 100%;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    .header-left {}
    .header-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #999999;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .header-date {
      font-size: 1.1rem;
      font-weight: 600;
      color: #888888;
    }
    .home-btn {
      display: none;
      padding: 8px 18px;
      background: #ffffff;
      color: #0a0a0a;
      border: 1px solid #e8e8e8;
      border-radius: 999px;
      font-size: 0.82rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .home-btn:hover { border-color: #0a0a0a; background: #f5f5f5; }
    .home-btn.visible { display: inline-block; }
    .progress-bar {
      height: 3px;
      background: #e8e8e8;
      border-radius: 999px;
      margin-bottom: 40px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #00c87a;
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    /* ── Source attribution ── */
    .source-tag {
      margin-bottom: 16px;
    }
    .source-book {
      font-size: 1rem;
      font-weight: 700;
      color: #0a0a0a;
      font-style: italic;
    }
    .source-author {
      font-size: 0.95rem;
      color: #555555;
      margin-left: 4px;
    }
    .source-topic {
      font-size: 0.78rem;
      font-weight: 600;
      color: #999999;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── Home screen ── */
    .home-screen {
      display: none;
    }
    .home-screen.show { display: block; }
    .home-title {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 12px;
    }
    .home-subtitle {
      font-size: 0.95rem;
      color: #666666;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .path-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .path-card {
      border: 1px solid #e8e8e8;
      border-radius: 16px;
      padding: 24px 28px;
      cursor: pointer;
      text-align: left;
      background: #ffffff;
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s;
      width: 100%;
    }
    .path-card:hover {
      border-color: #0a0a0a;
      background: #fafafa;
    }
    .path-card-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #0a0a0a;
    }
    .path-card-desc {
      font-size: 0.875rem;
      color: #666666;
      line-height: 1.55;
    }
    .path-card-tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 3px 10px;
      margin-bottom: 10px;
    }
    .tag-quiz { background: #e6fff4; color: #007a4a; }
    .tag-facts { background: #f0f0ff; color: #4040cc; }

    /* ── Quiz ── */
    .quiz-screen { display: none; }
    .quiz-screen.show { display: block; }
    .question {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 32px;
      color: #0a0a0a;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
    }
    .option-btn {
      text-align: left;
      padding: 16px 22px;
      border: 1px solid #e8e8e8;
      border-radius: 999px;
      background: #ffffff;
      font-size: 0.95rem;
      font-family: inherit;
      color: #0a0a0a;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      line-height: 1.45;
    }
    .option-btn:hover:not(:disabled) { background: #f5f5f5; }
    .option-btn.correct {
      border-color: #00c87a;
      background: #e6fff4;
      color: #007a4a;
    }
    .option-btn.wrong {
      border-color: #ff4d4d;
      background: #fff0f0;
      color: #cc0000;
    }
    .option-btn:disabled { cursor: default; }
    .explanation {
      display: none;
      border-left: 3px solid #e8e8e8;
      padding: 12px 16px;
      font-size: 0.875rem;
      color: #666666;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .explanation.show { display: block; }

    /* ── Score screen ── */
    .score-screen {
      display: none;
      text-align: center;
      padding-top: 24px;
    }
    .score-screen.show { display: block; }
    .score-big {
      font-size: 5rem;
      font-weight: 700;
      color: #0a0a0a;
      line-height: 1;
      margin-bottom: 8px;
    }
    .score-label {
      font-size: 1rem;
      color: #999999;
      margin-bottom: 24px;
    }
    .score-msg {
      font-size: 1.2rem;
      font-weight: 600;
      color: #0a0a0a;
      margin-bottom: 40px;
    }

    /* ── Facts screen ── */
    .facts-screen { display: none; }
    .facts-screen.show { display: block; }
    .fact-number {
      font-size: 0.78rem;
      font-weight: 600;
      color: #999999;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .fact-title {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 16px;
      color: #0a0a0a;
    }
    .fact-body {
      font-size: 1rem;
      color: #444444;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    /* ── Facts done screen ── */
    .facts-done-screen {
      display: none;
      text-align: center;
      padding-top: 24px;
    }
    .facts-done-screen.show { display: block; }
    .facts-done-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .facts-done-msg {
      font-size: 1rem;
      color: #666666;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    /* ── Shared buttons ── */
    .btn-primary {
      display: inline-block;
      padding: 14px 32px;
      background: #0a0a0a;
      color: #ffffff;
      border: none;
      border-radius: 999px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.82; }
    .btn-outline {
      display: inline-block;
      padding: 14px 32px;
      background: #ffffff;
      color: #0a0a0a;
      border: 1px solid #0a0a0a;
      border-radius: 999px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-outline:hover { background: #0a0a0a; color: #ffffff; }
    .btn-hidden { display: none; }
    .btn-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="header-left">
      <div class="header-label">Daily Learning</div>
      <div class="header-date">March 09, 2026</div>
    </div>
    <button class="home-btn" id="home-btn" onclick="showHome()">← Home</button>
  </div>
  <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>

  <!-- Home screen -->
  <div class="home-screen show" id="home-screen">
    <div class="home-title">Daily Insights from Hyder's Favourite Reads</div>
    <div class="home-subtitle">
      Every book I read, I take notes. This is where those notes come to life — a daily quiz or a fresh insight, refreshed every morning.
    </div>
    <div class="path-cards">
      <button class="path-card" onclick="startQuiz()">
        <div class="path-card-tag tag-quiz">Quiz</div>
        <div class="path-card-title">Test your knowledge</div>
        <div class="path-card-desc">5 multiple-choice questions on ideas from your books. See how much stuck — answers and explanations included.</div>
      </button>
      <button class="path-card" onclick="startFacts()">
        <div class="path-card-tag tag-facts">Interesting Facts</div>
        <div class="path-card-title">Just learn something new</div>
        <div class="path-card-desc">5 surprising or thought-provoking ideas pulled from today's reading. No right or wrong — just things worth knowing.</div>
      </button>
    </div>
  </div>

  <!-- Quiz screen -->
  <div class="quiz-screen" id="quiz-screen">
    <div class="source-tag" id="quiz-source"></div>
    <div class="question" id="question-text"></div>
    <div class="options" id="options-container"></div>
    <div class="explanation" id="explanation"></div>
    <div class="btn-row">
      <button class="btn-primary btn-hidden" id="next-btn">Next question →</button>
    </div>
  </div>

  <!-- Score screen -->
  <div class="score-screen" id="score-screen">
    <div class="score-big" id="score-value"></div>
    <div class="score-label">out of 5</div>
    <div class="score-msg" id="score-msg"></div>
    <div class="btn-row" style="justify-content:center; gap:12px;">
      <button class="btn-outline" onclick="showHome()">Back to home</button>
      <button class="btn-outline" onclick="startQuiz()">Try again</button>
    </div>
  </div>

  <!-- Facts screen -->
  <div class="facts-screen" id="facts-screen">
    <div class="fact-number" id="fact-number"></div>
    <div class="fact-title" id="fact-title"></div>
    <div class="fact-body" id="fact-body"></div>
    <div class="source-tag" id="fact-source"></div>
    <div class="btn-row">
      <button class="btn-primary" id="fact-next-btn">Next fact →</button>
    </div>
  </div>

  <!-- Facts done screen -->
  <div class="facts-done-screen" id="facts-done-screen">
    <div class="facts-done-title">That's a wrap.</div>
    <div class="facts-done-msg">5 ideas from today's reading. Come back tomorrow for more.</div>
    <div class="btn-row" style="justify-content:center; gap:12px;">
      <button class="btn-outline" onclick="showHome()">Back to home</button>
      <button class="btn-outline" onclick="startFacts()">Read again</button>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [{"question": "According to 'The Power of Habit,' what is the correct sequence of the habit loop?", "options": ["Cue → Reward → Routine", "Routine → Cue → Reward", "Cue → Routine → Reward", "Reward → Routine → Cue"], "answer": 2, "explanation": "The book describes the habit loop as consisting of three steps in order: a 'Cue' (a trigger that tells the brain to start automatic mode), a 'Routine' (the automatic action itself), and a 'Reward' (which helps the brain determine whether the loop is worth keeping).", "book": "The Power of Habit", "author": "Charles Duhigg", "topic": "Behavioural Psychology"}, {"question": "Which product is described as the 'killer app' that cemented Apple's association with designers and the publishing industry?", "options": ["The Apple II", "The Newton", "The iMac", "The LaserWriter"], "answer": 3, "explanation": "The notes state that the Mac's killer app was the LaserWriter — designed by Apple but developed in partnership with Canon for laser printing — which is why Apple became strongly associated with designers and the publishing world.", "book": "Apple in China", "author": "Patrick McGee", "topic": "Technology Business"}, {"question": "What made Cleopatra linguistically unusual compared to most other Ptolemaic rulers?", "options": ["She spoke only Latin to communicate with Roman officials", "She was one of the few Ptolemies to speak Egyptian and could speak up to nine languages without interpreters", "She relied heavily on interpreters because she only spoke Greek", "She invented a new written script to communicate with foreign dignitaries"], "answer": 1, "explanation": "The notes highlight that while most Ptolemaic rulers spoke primarily Greek, Cleopatra was among the very few who spoke Egyptian. She was reportedly able to speak up to nine languages without the need for interpreters, which was a remarkable and rare distinction.", "book": "Cleopatra: A Life", "author": "Stacy Schiff", "topic": "Ancient Egypt"}, {"question": "In the myth of Heracles, what was the origin of the Milky Way according to the notes from 'Heroes'?", "options": ["It was created when Zeus hurled a thunderbolt across the heavens during the war with the Titans", "It formed from the trail of light left by Pegasus after it was born from Medusa's dying body", "It originated when Hermes secretly had the infant Heracles feed on Hera's breast milk, which spilled into the sky when she pulled away", "It was a gift from Zeus to mark the constellations of Perseus and Andromeda after their deaths"], "answer": 2, "explanation": "According to the notes, Hermes secretly brought the infant Alcides (Heracles) to feed on Hera's milk so he could become immortal. When Hera removed the baby, her breast milk spilled into the sky, which is given as the mythological origin of the phrase 'Milky Way.'", "book": "Heroes", "author": "Stephen Fry", "topic": "Greek Mythology"}, {"question": "According to 'Unruly,' what is the origin of the English word 'Lord'?", "options": ["It derives from the Latin 'lordus,' meaning one who commands armies", "It comes from the Norman French word for landowner introduced after the Conquest of 1066", "It originates from the old English term 'hlaford,' meaning bread giver", "It is derived from the Brittonic word for king, 'Vortigern'"], "answer": 2, "explanation": "The notes explicitly state that the term 'Lord' derives from the old English word 'hlaford,' meaning 'bread giver,' reflecting the idea that providing basic protection and sustenance was enough to be considered worthy of a leadership role.", "book": "Unruly", "author": "David Mitchell", "topic": "British History"}];
const FACTS = [{"title": "Carthage's Fall Broke Rome", "fact": "Rome's defeat of Carthage in 146 BC — far from being a triumph — marked the beginning of its internal unraveling. With its greatest external enemy gone, Rome turned inward, descending into economic inequality, political polarization, and corruption, suggesting that existential threats can paradoxically hold a society together.", "book": "The Storm Before the Storm", "author": "Mike Duncan", "topic": "Ancient Rome"}, {"title": "King Priam Was a Purchase", "fact": "The name 'Priam', legendary king of Troy, literally translates to 'the one who has been bought.' He earned that name after his sister Hesione ransomed him from Heracles using a golden veil gifted by Aphrodite, meaning Troy's great king was defined not by conquest but by the price paid for his freedom.", "book": "Troy", "author": "Stephen Fry", "topic": "Greek Mythology"}, {"title": "Arabic Politics Means Herding", "fact": "While the English word 'politics' derives from the Greek 'polis' meaning city, the Arabic equivalent 'siyasah' traces its roots to the herding of horses and camels. This linguistic difference reveals how profoundly a culture's environment shapes its fundamental concepts — Arab political thought emerging from nomadic desert life rather than urban civic life.", "book": "Arabs: A 3,000-Year History of Peoples, Tribes and Empires", "author": "Tim Mackintosh-Smith", "topic": "Arab History"}, {"title": "Lord Means Bread Giver", "fact": "The English word 'Lord' derives from the Old English term 'hlaford', meaning 'bread giver.' This reveals that the original basis of kingship and noble authority in early medieval England was not divine right or military glory, but simply the ability to feed and protect people — power rooted in providing basic survival.", "book": "Unruly", "author": "David Mitchell", "topic": "British History"}, {"title": "Mirrors Reflect Your Imagination", "fact": "When Count Rostov studies himself in a barbershop mirror after an unsettling encounter, the novel observes that mirrors don't accurately reflect who you are — they show how you imagine yourself, from a preferred angle and with unconscious flattery. It's a quiet insight that self-perception is always a curated fiction.", "book": "A Gentleman in Moscow", "author": "Amor Towles", "topic": "Literary Fiction"}];

let current = 0;
let score = 0;

function hide(id) { document.getElementById(id).classList.remove("show"); }
function show(id) { document.getElementById(id).classList.add("show"); }

function showHome() {
  hide("quiz-screen");
  hide("score-screen");
  hide("facts-screen");
  hide("facts-done-screen");
  document.getElementById("progress-fill").style.width = "0%";
  document.getElementById("home-btn").classList.remove("visible");
  show("home-screen");
}

// ── Quiz ──

function startQuiz() {
  current = 0;
  score = 0;
  hide("home-screen");
  hide("score-screen");
  document.getElementById("home-btn").classList.add("visible");
  show("quiz-screen");
  showQuestion();
}

function showQuestion() {
  const q = QUESTIONS[current];
  document.getElementById("progress-fill").style.width =
    `${((current + 1) / QUESTIONS.length) * 100}%`;
  document.getElementById("quiz-source").innerHTML =
    `<div><span class="source-book">${q.book}</span><span class="source-author">&mdash; ${q.author}</span></div><div class="source-topic">Topic: ${q.topic}</div>`;
  document.getElementById("question-text").textContent = q.question;
  document.getElementById("explanation").textContent = "";
  document.getElementById("explanation").classList.remove("show");
  const nextBtn = document.getElementById("next-btn");
  nextBtn.classList.add("btn-hidden");

  const container = document.getElementById("options-container");
  container.innerHTML = "";
  const labels = ["A", "B", "C", "D"];
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = `${labels[i]}. ${opt}`;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });
}

function selectAnswer(chosen) {
  const q = QUESTIONS[current];
  const buttons = document.querySelectorAll(".option-btn");
  buttons.forEach(b => b.disabled = true);
  if (chosen === q.answer) {
    buttons[chosen].classList.add("correct");
    score++;
  } else {
    buttons[chosen].classList.add("wrong");
    buttons[q.answer].classList.add("correct");
  }
  const expEl = document.getElementById("explanation");
  expEl.textContent = q.explanation;
  expEl.classList.add("show");
  document.getElementById("next-btn").classList.remove("btn-hidden");
}

document.getElementById("next-btn").addEventListener("click", () => {
  current++;
  if (current < QUESTIONS.length) {
    showQuestion();
  } else {
    hide("quiz-screen");
    show("score-screen");
    document.getElementById("score-value").textContent = score;
    const msgs = [
      "Keep reading — you'll get there!",
      "Not bad, keep going!",
      "Good effort!",
      "Well done!",
      "Almost perfect!",
      "Perfect score! Outstanding!"
    ];
    document.getElementById("score-msg").textContent = msgs[score];
  }
});

// ── Facts ──

function startFacts() {
  current = 0;
  hide("home-screen");
  hide("facts-done-screen");
  document.getElementById("home-btn").classList.add("visible");
  show("facts-screen");
  showFact();
}

function showFact() {
  const f = FACTS[current];
  document.getElementById("progress-fill").style.width =
    `${((current + 1) / FACTS.length) * 100}%`;
  document.getElementById("fact-number").textContent =
    `Fact ${current + 1} of ${FACTS.length}`;
  document.getElementById("fact-title").textContent = f.title;
  document.getElementById("fact-body").textContent = f.fact;
  document.getElementById("fact-source").innerHTML =
    `<div><span class="source-book">${f.book}</span><span class="source-author">&mdash; ${f.author}</span></div><div class="source-topic">Topic: ${f.topic}</div>`;
  document.getElementById("fact-next-btn").textContent =
    current < FACTS.length - 1 ? "Next fact →" : "Finish";
}

document.getElementById("fact-next-btn").addEventListener("click", () => {
  current++;
  if (current < FACTS.length) {
    showFact();
  } else {
    hide("facts-screen");
    document.getElementById("progress-fill").style.width = "100%";
    show("facts-done-screen");
  }
});
</script>
</body>
</html>
