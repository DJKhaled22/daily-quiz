<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Quiz – March 09, 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 24px;
      color: #0a0a0a;
    }
    .card {
      max-width: 600px;
      width: 100%;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    .header-left {}
    .header-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #999999;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .header-date {
      font-size: 1.1rem;
      font-weight: 600;
      color: #888888;
    }
    .home-btn {
      display: none;
      padding: 8px 18px;
      background: #ffffff;
      color: #0a0a0a;
      border: 1px solid #e8e8e8;
      border-radius: 999px;
      font-size: 0.82rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .home-btn:hover { border-color: #0a0a0a; background: #f5f5f5; }
    .home-btn.visible { display: inline-block; }
    .progress-bar {
      height: 3px;
      background: #e8e8e8;
      border-radius: 999px;
      margin-bottom: 40px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #00c87a;
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    /* ── Source attribution ── */
    .source-tag {
      margin-bottom: 16px;
    }
    .source-book {
      font-size: 1rem;
      font-weight: 700;
      color: #0a0a0a;
      font-style: italic;
    }
    .source-author {
      font-size: 0.95rem;
      color: #555555;
      margin-left: 4px;
    }
    .source-topic {
      font-size: 0.78rem;
      font-weight: 600;
      color: #999999;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── Home screen ── */
    .home-screen {
      display: none;
    }
    .home-screen.show { display: block; }
    .home-title {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 12px;
    }
    .home-subtitle {
      font-size: 0.95rem;
      color: #666666;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .path-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .path-card {
      border: 1px solid #e8e8e8;
      border-radius: 16px;
      padding: 24px 28px;
      cursor: pointer;
      text-align: left;
      background: #ffffff;
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s;
      width: 100%;
    }
    .path-card:hover {
      border-color: #0a0a0a;
      background: #fafafa;
    }
    .path-card-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #0a0a0a;
    }
    .path-card-desc {
      font-size: 0.875rem;
      color: #666666;
      line-height: 1.55;
    }
    .path-card-tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 3px 10px;
      margin-bottom: 10px;
    }
    .tag-quiz { background: #e6fff4; color: #007a4a; }
    .tag-facts { background: #f0f0ff; color: #4040cc; }

    /* ── Quiz ── */
    .quiz-screen { display: none; }
    .quiz-screen.show { display: block; }
    .question {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 32px;
      color: #0a0a0a;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
    }
    .option-btn {
      text-align: left;
      padding: 16px 22px;
      border: 1px solid #e8e8e8;
      border-radius: 999px;
      background: #ffffff;
      font-size: 0.95rem;
      font-family: inherit;
      color: #0a0a0a;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      line-height: 1.45;
    }
    .option-btn:hover:not(:disabled) { background: #f5f5f5; }
    .option-btn.correct {
      border-color: #00c87a;
      background: #e6fff4;
      color: #007a4a;
    }
    .option-btn.wrong {
      border-color: #ff4d4d;
      background: #fff0f0;
      color: #cc0000;
    }
    .option-btn:disabled { cursor: default; }
    .explanation {
      display: none;
      border-left: 3px solid #e8e8e8;
      padding: 12px 16px;
      font-size: 0.875rem;
      color: #666666;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .explanation.show { display: block; }

    /* ── Score screen ── */
    .score-screen {
      display: none;
      text-align: center;
      padding-top: 24px;
    }
    .score-screen.show { display: block; }
    .score-big {
      font-size: 5rem;
      font-weight: 700;
      color: #0a0a0a;
      line-height: 1;
      margin-bottom: 8px;
    }
    .score-label {
      font-size: 1rem;
      color: #999999;
      margin-bottom: 24px;
    }
    .score-msg {
      font-size: 1.2rem;
      font-weight: 600;
      color: #0a0a0a;
      margin-bottom: 40px;
    }

    /* ── Facts screen ── */
    .facts-screen { display: none; }
    .facts-screen.show { display: block; }
    .fact-number {
      font-size: 0.78rem;
      font-weight: 600;
      color: #999999;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .fact-title {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 16px;
      color: #0a0a0a;
    }
    .fact-body {
      font-size: 1rem;
      color: #444444;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    /* ── Facts done screen ── */
    .facts-done-screen {
      display: none;
      text-align: center;
      padding-top: 24px;
    }
    .facts-done-screen.show { display: block; }
    .facts-done-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .facts-done-msg {
      font-size: 1rem;
      color: #666666;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    /* ── Shared buttons ── */
    .btn-primary {
      display: inline-block;
      padding: 14px 32px;
      background: #0a0a0a;
      color: #ffffff;
      border: none;
      border-radius: 999px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.82; }
    .btn-outline {
      display: inline-block;
      padding: 14px 32px;
      background: #ffffff;
      color: #0a0a0a;
      border: 1px solid #0a0a0a;
      border-radius: 999px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-outline:hover { background: #0a0a0a; color: #ffffff; }
    .btn-hidden { display: none; }
    .btn-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="header-left">
      <div class="header-label">Daily Learning</div>
      <div class="header-date">March 09, 2026</div>
    </div>
    <button class="home-btn" id="home-btn" onclick="showHome()">← Home</button>
  </div>
  <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>

  <!-- Home screen -->
  <div class="home-screen show" id="home-screen">
    <div class="home-title">Daily Insights from Hyder's Favourite Reads</div>
    <div class="home-subtitle">
      Every book I read, I take notes. This is where those notes come to life — a daily quiz or a fresh insight, refreshed every morning.
    </div>
    <div class="path-cards">
      <button class="path-card" onclick="startFacts()">
        <div class="path-card-tag tag-facts">Interesting Facts</div>
        <div class="path-card-title">Just learn something new</div>
        <div class="path-card-desc">5 surprising or thought-provoking ideas pulled from today's reading. No right or wrong — just things worth knowing.</div>
      </button>
      <button class="path-card" onclick="startQuiz()">
        <div class="path-card-tag tag-quiz">Quiz</div>
        <div class="path-card-title">Test your knowledge</div>
        <div class="path-card-desc">5 multiple-choice questions on ideas from your books. See how much stuck — answers and explanations included.</div>
      </button>
    </div>
  </div>

  <!-- Quiz screen -->
  <div class="quiz-screen" id="quiz-screen">
    <div class="source-tag" id="quiz-source"></div>
    <div class="question" id="question-text"></div>
    <div class="options" id="options-container"></div>
    <div class="explanation" id="explanation"></div>
    <div class="btn-row">
      <button class="btn-primary btn-hidden" id="next-btn">Next question →</button>
    </div>
  </div>

  <!-- Score screen -->
  <div class="score-screen" id="score-screen">
    <div class="score-big" id="score-value"></div>
    <div class="score-label">out of 5</div>
    <div class="score-msg" id="score-msg"></div>
    <div class="btn-row" style="justify-content:center; gap:12px;">
      <button class="btn-outline" onclick="showHome()">Back to home</button>
      <button class="btn-outline" onclick="startQuiz()">Try again</button>
    </div>
  </div>

  <!-- Facts screen -->
  <div class="facts-screen" id="facts-screen">
    <div class="fact-number" id="fact-number"></div>
    <div class="fact-title" id="fact-title"></div>
    <div class="fact-body" id="fact-body"></div>
    <div class="source-tag" id="fact-source"></div>
    <div class="btn-row">
      <button class="btn-primary" id="fact-next-btn">Next fact →</button>
    </div>
  </div>

  <!-- Facts done screen -->
  <div class="facts-done-screen" id="facts-done-screen">
    <div class="facts-done-title">That's a wrap.</div>
    <div class="facts-done-msg">5 ideas from today's reading. Come back tomorrow for more.</div>
    <div class="btn-row" style="justify-content:center; gap:12px;">
      <button class="btn-outline" onclick="showHome()">Back to home</button>
      <button class="btn-outline" onclick="startFacts()">Read again</button>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [{"question": "According to the notes on Arab history, what is the origin of the Arabic word for politics, 'Siyasah'?", "options": ["It derives from the Arabic word for 'city' or 'settlement'", "It traces back to words related to the herding of horses and camels", "It originates from ancient Nabataean trade terminology", "It comes from a poetic term used by early Arab scholars"], "answer": 1, "explanation": "The notes state that the Arabic word for politics, 'Siyasah', ties its origins to the words for herding of horses and camels, contrasting with the English word 'politics' which stems from 'polis', meaning city.", "book": "Arabs", "author": "Unknown", "topic": "Arab History Culture"}, {"question": "In 'The Taste of Empire', which city emerged as a key maritime hub partly due to its wine trade connections with Spain and Portugal, and later became central to the Atlantic cod trade?", "options": ["London", "Plymouth", "Cork", "Bristol"], "answer": 3, "explanation": "The notes explain that Bristol was famous for its wine trade, which gave it connections to Spain and Portugal. These networks made it a key maritime city with knowledge of Atlantic currents, and it became central to the cod fishing trade that helped establish the British Empire.", "book": "The Taste of Empire", "author": "Unknown", "topic": "British Empire Food"}, {"question": "According to the notes on 'Istanbul: Memories and the City', which Ottoman sultan ruled from 1876 to 1909?", "options": ["Abdulhamit the 2nd", "Suleiman the Magnificent", "Mehmed the 2nd", "Selim the 1st"], "answer": 0, "explanation": "The notes specifically mention that Abdulhamit the 2nd ruled the Ottomans from 1876 to 1909, which is one of the few historical facts recorded in this note.", "book": "Istanbul: Memories and the City", "author": "Orhan Pamuk", "topic": "Ottoman Istanbul History"}, {"question": "In the notes on The Odyssey, why did Clytemnestra kill Agamemnon upon his return?", "options": ["She was angry that Agamemnon had taken Cassandra as a war prize", "She was driven by an affair and fury over Agamemnon sacrificing their daughter using a false promise of marriage to Achilles", "She conspired with the suitors of Ithaca to seize the throne", "She sought revenge for Agamemnon abandoning her during the Trojan War"], "answer": 1, "explanation": "According to the notes, Clytemnestra had an affair with Agamemnon's cousin and was fuelled by rage over Agamemnon sacrificing their daughter to appease the goddess Artemis, using a fake marriage to Achilles as a trick. She stabs him in his bath alongside her lover.", "book": "The Odyssey", "author": "Homer", "topic": "Greek Mythology Epic"}, {"question": "In the notes on Troy, how did Podarces come to rule Troy and take on the name Priam?", "options": ["He was appointed king by the gods Apollo and Poseidon after the death of his father", "He won a chariot race against rival kings to claim the throne of Troy", "He was spared by Heracles and ransomed in exchange for a golden veil from Aphrodite, with 'Priam' meaning 'the one who has bought'", "He inherited the throne after his brother Ilus died without an heir"], "answer": 2, "explanation": "The notes explain that after Heracles killed King Laomedon and his descendants, Podarces was spared along with his sister Hesione. He was ransomed in exchange for a golden veil gifted by Aphrodite, and the name Priam translates to 'the one who has bought', reflecting this transaction.", "book": "Troy", "author": "Unknown", "topic": "Greek Mythology Troy"}];
const FACTS = [{"title": "Leopold's Congo Con", "fact": "King Leopold II of Belgium secured the Congo — today the 11th largest country by landmass — by presenting it as an insignificant plot to rival European powers, while secretly already knowing its vast resource wealth from prior land surveys. He then enslaved its population to extract rubber, killing an estimated 10 million people over 20 years, all without ever once setting foot in Africa.", "book": "Africa is not a country", "author": "Unknown", "topic": "African Colonial History"}, {"title": "Cod Built the British Empire", "fact": "The British Empire's global expansion was quietly seeded by the humble codfish — Bristol merchants chasing cod across the Atlantic developed the navigational knowledge of ocean currents that made transatlantic exploration possible, and the cash from selling salted cod to Southern Europe directly funded Britain's imperial ventures. By 1775, food made up half of the British Empire's imports, with sugar eventually overtaking linen as the most valuable one.", "book": "The Taste of Empire", "author": "Unknown", "topic": "Food and Empire"}, {"title": "Shared Documents Aren't Shared Understanding", "fact": "Writing something down and distributing it does not mean everyone reading it imagines the same thing — true shared understanding only exists when both parties grasp what the other is picturing and why. This reframes 'requirements' not as a written checklist but as a collaborative, visual, and conversational process focused on who benefits and what problem is actually being solved.", "book": "User Story Mapping", "author": "Unknown", "topic": "Product Management"}, {"title": "Tantrums Are Teaching Opportunities", "fact": "The moments parents most want to simply 'survive' — a tantrum, a sibling fight, a meltdown — are actually the highest-value opportunities to build a child's empathy, emotional resilience, and social skills. This means parents don't need to engineer special, idealized bonding experiences; the messy, everyday difficult moments are already the raw material for raising thriving children.", "book": "The Whole Brain Child", "author": "Unknown", "topic": "Child Development"}, {"title": "The Catfish Effect in Business", "fact": "Norwegian fishermen discovered that placing a single catfish among sardines in a tank kept the sardines constantly moving out of fear — and far more of them survived the journey to market. China deliberately applied this same logic to its domestic industries, introducing a competitive predator like Tesla to jolt complacent local automakers into performing better.", "book": "Apple in China", "author": "Unknown", "topic": "Business and China"}];

let current = 0;
let score = 0;

function hide(id) { document.getElementById(id).classList.remove("show"); }
function show(id) { document.getElementById(id).classList.add("show"); }

function showHome() {
  hide("quiz-screen");
  hide("score-screen");
  hide("facts-screen");
  hide("facts-done-screen");
  document.getElementById("progress-fill").style.width = "0%";
  document.getElementById("home-btn").classList.remove("visible");
  show("home-screen");
}

// ── Quiz ──

function startQuiz() {
  current = 0;
  score = 0;
  hide("home-screen");
  hide("score-screen");
  document.getElementById("home-btn").classList.add("visible");
  show("quiz-screen");
  showQuestion();
}

function showQuestion() {
  const q = QUESTIONS[current];
  document.getElementById("progress-fill").style.width =
    `${((current + 1) / QUESTIONS.length) * 100}%`;
  document.getElementById("quiz-source").innerHTML =
    `<div><span class="source-book">${q.book}</span><span class="source-author">&mdash; ${q.author}</span></div><div class="source-topic">Topic: ${q.topic}</div>`;
  document.getElementById("question-text").textContent = q.question;
  document.getElementById("explanation").textContent = "";
  document.getElementById("explanation").classList.remove("show");
  const nextBtn = document.getElementById("next-btn");
  nextBtn.classList.add("btn-hidden");

  const container = document.getElementById("options-container");
  container.innerHTML = "";
  const labels = ["A", "B", "C", "D"];
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = `${labels[i]}. ${opt}`;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });
}

function selectAnswer(chosen) {
  const q = QUESTIONS[current];
  const buttons = document.querySelectorAll(".option-btn");
  buttons.forEach(b => b.disabled = true);
  if (chosen === q.answer) {
    buttons[chosen].classList.add("correct");
    score++;
  } else {
    buttons[chosen].classList.add("wrong");
    buttons[q.answer].classList.add("correct");
  }
  const expEl = document.getElementById("explanation");
  expEl.textContent = q.explanation;
  expEl.classList.add("show");
  document.getElementById("next-btn").classList.remove("btn-hidden");
}

document.getElementById("next-btn").addEventListener("click", () => {
  current++;
  if (current < QUESTIONS.length) {
    showQuestion();
  } else {
    hide("quiz-screen");
    show("score-screen");
    document.getElementById("score-value").textContent = score;
    const msgs = [
      "Keep reading — you'll get there!",
      "Not bad, keep going!",
      "Good effort!",
      "Well done!",
      "Almost perfect!",
      "Perfect score! Outstanding!"
    ];
    document.getElementById("score-msg").textContent = msgs[score];
  }
});

// ── Facts ──

function startFacts() {
  current = 0;
  hide("home-screen");
  hide("facts-done-screen");
  document.getElementById("home-btn").classList.add("visible");
  show("facts-screen");
  showFact();
}

function showFact() {
  const f = FACTS[current];
  document.getElementById("progress-fill").style.width =
    `${((current + 1) / FACTS.length) * 100}%`;
  document.getElementById("fact-number").textContent =
    `Fact ${current + 1} of ${FACTS.length}`;
  document.getElementById("fact-title").textContent = f.title;
  document.getElementById("fact-body").textContent = f.fact;
  document.getElementById("fact-source").innerHTML =
    `<div><span class="source-book">${f.book}</span><span class="source-author">&mdash; ${f.author}</span></div><div class="source-topic">Topic: ${f.topic}</div>`;
  document.getElementById("fact-next-btn").textContent =
    current < FACTS.length - 1 ? "Next fact →" : "Finish";
}

document.getElementById("fact-next-btn").addEventListener("click", () => {
  current++;
  if (current < FACTS.length) {
    showFact();
  } else {
    hide("facts-screen");
    document.getElementById("progress-fill").style.width = "100%";
    show("facts-done-screen");
  }
});
</script>
</body>
</html>
