<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Quiz – March 09, 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 24px;
      color: #0a0a0a;
    }
    .card {
      max-width: 600px;
      width: 100%;
    }
    .header {
      margin-bottom: 32px;
    }
    .header-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #999999;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .header-date {
      font-size: 1.1rem;
      font-weight: 600;
      color: #888888;
    }
    .progress-bar {
      height: 3px;
      background: #e8e8e8;
      border-radius: 999px;
      margin-bottom: 40px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #00c87a;
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    /* ── Source attribution ── */
    .source-tag {
      display: inline-block;
      font-size: 0.78rem;
      color: #999999;
      margin-bottom: 14px;
    }
    .source-tag span {
      font-style: italic;
    }

    /* ── Home screen ── */
    .home-screen {
      display: none;
    }
    .home-screen.show { display: block; }
    .home-title {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 12px;
    }
    .home-subtitle {
      font-size: 0.95rem;
      color: #666666;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .path-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .path-card {
      border: 1px solid #e8e8e8;
      border-radius: 16px;
      padding: 24px 28px;
      cursor: pointer;
      text-align: left;
      background: #ffffff;
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s;
      width: 100%;
    }
    .path-card:hover {
      border-color: #0a0a0a;
      background: #fafafa;
    }
    .path-card-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #0a0a0a;
    }
    .path-card-desc {
      font-size: 0.875rem;
      color: #666666;
      line-height: 1.55;
    }
    .path-card-tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 3px 10px;
      margin-bottom: 10px;
    }
    .tag-quiz { background: #e6fff4; color: #007a4a; }
    .tag-facts { background: #f0f0ff; color: #4040cc; }

    /* ── Quiz ── */
    .quiz-screen { display: none; }
    .quiz-screen.show { display: block; }
    .question {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 32px;
      color: #0a0a0a;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
    }
    .option-btn {
      text-align: left;
      padding: 16px 22px;
      border: 1px solid #e8e8e8;
      border-radius: 999px;
      background: #ffffff;
      font-size: 0.95rem;
      font-family: inherit;
      color: #0a0a0a;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      line-height: 1.45;
    }
    .option-btn:hover:not(:disabled) { background: #f5f5f5; }
    .option-btn.correct {
      border-color: #00c87a;
      background: #e6fff4;
      color: #007a4a;
    }
    .option-btn.wrong {
      border-color: #ff4d4d;
      background: #fff0f0;
      color: #cc0000;
    }
    .option-btn:disabled { cursor: default; }
    .explanation {
      display: none;
      border-left: 3px solid #e8e8e8;
      padding: 12px 16px;
      font-size: 0.875rem;
      color: #666666;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .explanation.show { display: block; }

    /* ── Score screen ── */
    .score-screen {
      display: none;
      text-align: center;
      padding-top: 24px;
    }
    .score-screen.show { display: block; }
    .score-big {
      font-size: 5rem;
      font-weight: 700;
      color: #0a0a0a;
      line-height: 1;
      margin-bottom: 8px;
    }
    .score-label {
      font-size: 1rem;
      color: #999999;
      margin-bottom: 24px;
    }
    .score-msg {
      font-size: 1.2rem;
      font-weight: 600;
      color: #0a0a0a;
      margin-bottom: 40px;
    }

    /* ── Facts screen ── */
    .facts-screen { display: none; }
    .facts-screen.show { display: block; }
    .fact-number {
      font-size: 0.78rem;
      font-weight: 600;
      color: #999999;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .fact-title {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 16px;
      color: #0a0a0a;
    }
    .fact-body {
      font-size: 1rem;
      color: #444444;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    /* ── Facts done screen ── */
    .facts-done-screen {
      display: none;
      text-align: center;
      padding-top: 24px;
    }
    .facts-done-screen.show { display: block; }
    .facts-done-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .facts-done-msg {
      font-size: 1rem;
      color: #666666;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    /* ── Shared buttons ── */
    .btn-primary {
      display: inline-block;
      padding: 14px 32px;
      background: #0a0a0a;
      color: #ffffff;
      border: none;
      border-radius: 999px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.82; }
    .btn-outline {
      display: inline-block;
      padding: 14px 32px;
      background: #ffffff;
      color: #0a0a0a;
      border: 1px solid #0a0a0a;
      border-radius: 999px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-outline:hover { background: #0a0a0a; color: #ffffff; }
    .btn-hidden { display: none; }
    .btn-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="header-label">Daily Learning</div>
    <div class="header-date">March 09, 2026</div>
  </div>
  <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>

  <!-- Home screen -->
  <div class="home-screen show" id="home-screen">
    <div class="home-title">Daily Insights from Hyder's Favourite Reads</div>
    <div class="home-subtitle">
      Every book I read, I take notes. This is where those notes come to life — a daily quiz or a fresh insight, refreshed every morning.
    </div>
    <div class="path-cards">
      <button class="path-card" onclick="startQuiz()">
        <div class="path-card-tag tag-quiz">Quiz</div>
        <div class="path-card-title">Test your knowledge</div>
        <div class="path-card-desc">5 multiple-choice questions on ideas from your books. See how much stuck — answers and explanations included.</div>
      </button>
      <button class="path-card" onclick="startFacts()">
        <div class="path-card-tag tag-facts">Interesting Facts</div>
        <div class="path-card-title">Just learn something new</div>
        <div class="path-card-desc">5 surprising or thought-provoking ideas pulled from today's reading. No right or wrong — just things worth knowing.</div>
      </button>
    </div>
  </div>

  <!-- Quiz screen -->
  <div class="quiz-screen" id="quiz-screen">
    <div class="source-tag" id="quiz-source"></div>
    <div class="question" id="question-text"></div>
    <div class="options" id="options-container"></div>
    <div class="explanation" id="explanation"></div>
    <div class="btn-row">
      <button class="btn-primary btn-hidden" id="next-btn">Next question →</button>
    </div>
  </div>

  <!-- Score screen -->
  <div class="score-screen" id="score-screen">
    <div class="score-big" id="score-value"></div>
    <div class="score-label">out of 5</div>
    <div class="score-msg" id="score-msg"></div>
    <div class="btn-row" style="justify-content:center; gap:12px;">
      <button class="btn-outline" onclick="showHome()">Back to home</button>
      <button class="btn-outline" onclick="startQuiz()">Try again</button>
    </div>
  </div>

  <!-- Facts screen -->
  <div class="facts-screen" id="facts-screen">
    <div class="fact-number" id="fact-number"></div>
    <div class="fact-title" id="fact-title"></div>
    <div class="fact-body" id="fact-body"></div>
    <div class="source-tag" id="fact-source"></div>
    <div class="btn-row">
      <button class="btn-primary" id="fact-next-btn">Next fact →</button>
    </div>
  </div>

  <!-- Facts done screen -->
  <div class="facts-done-screen" id="facts-done-screen">
    <div class="facts-done-title">That's a wrap.</div>
    <div class="facts-done-msg">5 ideas from today's reading. Come back tomorrow for more.</div>
    <div class="btn-row" style="justify-content:center; gap:12px;">
      <button class="btn-outline" onclick="showHome()">Back to home</button>
      <button class="btn-outline" onclick="startFacts()">Read again</button>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [{"question": "According to the notes on 'Destiny Disrupted,' what was the core belief of Abdul Wahab that led to the founding of Wahhabism?", "options": ["Muslims needed to adopt Western scientific methods to strengthen Islam", "Muslims had been corrupted and needed to return to Islam's core roots", "The Ottoman Empire was the rightful leader of all Muslim lands", "Islamic law needed to be reformed through a Protestant-like movement"], "answer": 1, "explanation": "The notes state that Abdul Wahab believed Muslims had been corrupted and needed to go back to Islam's core meaning and roots, which was the foundational belief driving Wahhabism.", "book": "Destiny Disrupted", "author": "Tamim Ansary"}, {"question": "According to 'The Power of Habit,' what is the correct order of the habit loop?", "options": ["Routine, Cue, Reward", "Reward, Routine, Cue", "Cue, Routine, Reward", "Cue, Reward, Routine"], "answer": 2, "explanation": "The notes explicitly describe the habit loop as: 1. 'Cue' — a trigger for the brain to start automatic mode, 2. 'Routine' — the automatic action, and 3. 'Reward' — which helps the brain determine if the habit is worth keeping.", "book": "The Power of Habit", "author": "Charles Duhigg"}, {"question": "Based on the notes from 'Arabs,' what does the Arabic word for politics, 'Siyasah,' trace its origins to?", "options": ["The governance of ancient desert tribes", "The herding of horses and camels", "The administration of trade caravans", "The ruling of city-states in the Fertile Crescent"], "answer": 1, "explanation": "The notes specifically highlight that while the English word 'politics' stems from 'polis' meaning city, the Arabic word 'Siyasah' traces its origins to words relating to the herding of horses and camels.", "book": "Arabs", "author": "Tim Mackintosh-Smith"}, {"question": "According to the notes on 'Apple in China,' what strategic mistake did Steve Jobs make that allowed IBM and Microsoft to dominate the personal computing market?", "options": ["He invested too heavily in outsourcing manufacturing to Taiwan and Japan", "He failed to develop a competitive operating system to rival Windows", "He did not embrace the more open model that enabled third-party competition", "He focused too much on the consumer market instead of enterprise clients"], "answer": 2, "explanation": "The notes state that Jobs miscalculated because IBM/Microsoft's more open-source model enabled greater competition and third-party development, whereas Jobs prioritized a closed 'better experience' approach and disliked third parties.", "book": "Apple in China", "author": "Patrick McGee"}, {"question": "According to the notes from 'User Story Mapping,' what is the key problem with relying solely on shared documents for communication?", "options": ["Documents are too time-consuming to produce and maintain", "Shared documents do not equal shared understanding and can lead to broken telephone", "Documents focus too much on visuals rather than written requirements", "Shared documents make it difficult to track who is responsible for each requirement"], "answer": 1, "explanation": "The notes directly quote: 'Shared documents don't equal shared understanding,' noting there can be a 'broken telephone' effect, meaning people may interpret documents differently from what was intended.", "book": "User Story Mapping", "author": "Jeff Patton"}];
const FACTS = [{"title": "Cod Fish Built British Empire", "fact": "The British Empire's global expansion was partly financed by salted cod. Southern European demand for English cod injected cash into the British economy, which was then reinvested into funding further exploration — meaning a humble fish effectively bankrolled imperial ambition. Bristol's role as a cod-trading hub also gave English sailors the navigational knowledge of Atlantic currents needed to reach the New World.", "book": "The Taste of Empire", "author": "Unknown"}, {"title": "iPhone's Lopsided Profit Dominance", "fact": "Despite holding under 20% market share in smartphones, the iPhone accounts for roughly 80% of the entire industry's profits. This stark gap reveals how Apple's premium pricing and ecosystem lock-in allow it to extract the vast majority of value from a market it does not numerically dominate.", "book": "Apple in China", "author": "Unknown"}, {"title": "Panic Is Easier Than Thinking", "fact": "Some people actually prefer to panic during a crisis because reacting on survival instinct is easier than consciously confronting reality. The Greeks had a term for the antidote — 'apatheia' — meaning calmness free from harmful emotion, not the absence of feeling but the deliberate refusal to let destructive reactions take over.", "book": "The Obstacle Is the Way", "author": "Ryan Holiday"}, {"title": "Defeating Carthage Destroyed Rome", "fact": "Rome's final victory over Carthage in 146 BC, rather than strengthening the republic, paradoxically triggered its slow collapse. With no external threat to unify them, Roman society fractured into rising economic inequality, political polarization, and rampant corruption — the very conditions that would eventually end the republic.", "book": "The Storm Before the Storm", "author": "Mike Duncan"}, {"title": "Kandahar's Name Honors Alexander", "fact": "The city of Kandahar in modern Afghanistan derives its name from 'Iskandar,' the Persian and Arabic rendering of Alexander the Great's name — a linguistic fossil preserving the memory of his conquests over two thousand years later. It is a reminder that place names can carry the echoes of ancient empires long after those empires have vanished.", "book": "Destiny Disrupted", "author": "Tamim Ansary"}];

let current = 0;
let score = 0;

function hide(id) { document.getElementById(id).classList.remove("show"); }
function show(id) { document.getElementById(id).classList.add("show"); }

function showHome() {
  hide("quiz-screen");
  hide("score-screen");
  hide("facts-screen");
  hide("facts-done-screen");
  document.getElementById("progress-fill").style.width = "0%";
  show("home-screen");
}

// ── Quiz ──

function startQuiz() {
  current = 0;
  score = 0;
  hide("home-screen");
  hide("score-screen");
  show("quiz-screen");
  showQuestion();
}

function showQuestion() {
  const q = QUESTIONS[current];
  document.getElementById("progress-fill").style.width =
    `${((current + 1) / QUESTIONS.length) * 100}%`;
  document.getElementById("quiz-source").innerHTML =
    `<span>${q.book}</span> &mdash; ${q.author}`;
  document.getElementById("question-text").textContent = q.question;
  document.getElementById("explanation").textContent = "";
  document.getElementById("explanation").classList.remove("show");
  const nextBtn = document.getElementById("next-btn");
  nextBtn.classList.add("btn-hidden");

  const container = document.getElementById("options-container");
  container.innerHTML = "";
  const labels = ["A", "B", "C", "D"];
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = `${labels[i]}. ${opt}`;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });
}

function selectAnswer(chosen) {
  const q = QUESTIONS[current];
  const buttons = document.querySelectorAll(".option-btn");
  buttons.forEach(b => b.disabled = true);
  if (chosen === q.answer) {
    buttons[chosen].classList.add("correct");
    score++;
  } else {
    buttons[chosen].classList.add("wrong");
    buttons[q.answer].classList.add("correct");
  }
  const expEl = document.getElementById("explanation");
  expEl.textContent = q.explanation;
  expEl.classList.add("show");
  document.getElementById("next-btn").classList.remove("btn-hidden");
}

document.getElementById("next-btn").addEventListener("click", () => {
  current++;
  if (current < QUESTIONS.length) {
    showQuestion();
  } else {
    hide("quiz-screen");
    show("score-screen");
    document.getElementById("score-value").textContent = score;
    const msgs = [
      "Keep reading — you'll get there!",
      "Not bad, keep going!",
      "Good effort!",
      "Well done!",
      "Almost perfect!",
      "Perfect score! Outstanding!"
    ];
    document.getElementById("score-msg").textContent = msgs[score];
  }
});

// ── Facts ──

function startFacts() {
  current = 0;
  hide("home-screen");
  hide("facts-done-screen");
  show("facts-screen");
  showFact();
}

function showFact() {
  const f = FACTS[current];
  document.getElementById("progress-fill").style.width =
    `${((current + 1) / FACTS.length) * 100}%`;
  document.getElementById("fact-number").textContent =
    `Fact ${current + 1} of ${FACTS.length}`;
  document.getElementById("fact-title").textContent = f.title;
  document.getElementById("fact-body").textContent = f.fact;
  document.getElementById("fact-source").innerHTML =
    `<span>${f.book}</span> &mdash; ${f.author}`;
  document.getElementById("fact-next-btn").textContent =
    current < FACTS.length - 1 ? "Next fact →" : "Finish";
}

document.getElementById("fact-next-btn").addEventListener("click", () => {
  current++;
  if (current < FACTS.length) {
    showFact();
  } else {
    hide("facts-screen");
    document.getElementById("progress-fill").style.width = "100%";
    show("facts-done-screen");
  }
});
</script>
</body>
</html>
